const button = document.getElementById("uploadBtn");

console.log("SCRIPT STARTED");

// 🔹 UPLOAD FUNCTION
async function uploadData() {
  console.log("BUTTON CLICKED");

  try {
    alert("Uploading products...");

    for (let i=0; i < products.length; i++){
      let product = products[i];
      if(!products.name) {
        console.log("Skipped:",product);
        continue;
      }
      console.log("uploading:",product.name);
      await setDoc(doc(db,"products",product.name), product);
      console.log("Uploaded:",product.name);

      if (i % 10 === 0){
        await new Promise(resolve =>setTimeout(resolve, 1000));
      }
    }
    alert("All products uploaded!");
  } catch (error) {
    console.error("ERROR:".error);
    alert("Upload failed. Check console.");
  }
}

// 🔹 EVENT LISTENER (ONLY ONE)
button.addEventListener("click", uploadData);

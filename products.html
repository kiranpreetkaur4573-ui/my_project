<!DOCTYPE html>
<html>
<head>
  <title>My Products</title>
  <style>
    body {
      font-family: Arial;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      transition: 0.3s;
      padding: 10px;
      width: 200px;
    }
    .card:hover {
      transform: scale(1.05);
    }
    button {
      background: black;
      color: white;
      border: none;
      padding: 5px;
      cursor: pointer;
    }
    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
  </style>
</head>

<body>

<h2>My Products</h2>

<select id="filter">
  <option value="all">All</option>
  <option value="Salwar Suit">Salwar Suit</option>
  <option value="Saree">Saree</option>
  <option value="Gown">Gown</option>
  <option value="Pant Suit">Pant Suit</option>
  <option value="Lehenga">Lehenga</option>
  <option value="Peplum Style">Peplum Style</option>
  <option value="Frock Suit">Frock Suit</option>
  <option value="Pakistani Suits">Pakistani Suits</option>
  <option value="Sharara Suit">Sharara Suit</option>
  <option value="Pent-palazo Suit">Pent-palazo Suit</option>
  <option value="Indo-Western">Indo-Western</option>
  <option value="Pazami Suit">Pazami Suit</option>
</select>

<div class="container" id="productContainer"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDpnSVwV3QP9MP4tuU5SCtXiwpdAUD0vlc",
    authDomain: "trendlilly-boutique.firebaseapp.com",
    projectId: "trendlilly-boutique"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const container = document.getElementById("productContainer");
  const filter = document.getElementById("filter");

  let isLoading = false;

  // Navigate to product detail
  function viewproduct(id) {
    window.location.href = `product-detail.html?id=${id}`;
  }

  // Load products
  function loadProducts(category = "all") {

    if (isLoading) return;
    isLoading = true;

    console.log("Loading:", category);

    let query = db.collection("products");

    if (category !== "all") {
      query = query.where("category", "==", category);
    }

    query.get()
      .then((snapshot) => {

        let products = [];

        snapshot.forEach((doc) => {
          const data = doc.data();
          if (!data.img || !data.name || !data.category || !data.price) {
            console.log("Skipped bad product:", data);
            return;
          }
          products.push({ id:doc.id, ...data});
        });
         const names = products.map(p => p.name);
  const uniqueNames = [...new Set(names)];

  console.log("Total products:",names.length);
  console.log("unique products:",uniqueNames.length);

  if (names.length === uniqueNames.length)
  {
    console.log("No duplicates found");
  }else{
    console.log("Duplicates exist");
  }


        // ✅ Remove duplicates (based on product name)
        const uniqueProducts = [...new Map(products.map(p => [p.name, p])).values()];

        displayProducts(uniqueProducts);
      })
      .catch(console.error)
      .finally(() => {
        isLoading = false;
      });
  }
  //check duplicates
 
  // Display products
  function displayProducts(data) {
    console.log("Display called with item:", data.length);

    container.innerHTML = "";

    data.forEach((product) => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${product.img}">
        <h3>${product.name}</h3>
        <p>${product.category}</p>
        <p>${product.price}</p>
        <button onclick="viewproduct('${product.id}')">View</button>
      `;

      container.appendChild(card);
    });
  }

  // Dropdown change
  filter.addEventListener("change", () => {
    loadProducts(filter.value);
  });

  // Initial load
  loadProducts();
</script>

</body>
</html>

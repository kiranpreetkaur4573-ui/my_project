<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login – TrendLilly</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#c595b0;--deep:#7a2d52;--blush:#faedeb;--plum:#4a1a32;--soft:#f5dde8;--white:#fff;--text:#3d1a28;--border:#e8c5d4;--muted:#9e6b80;--green:#2e7d4f;--red:#c0392b}
body{font-family:'DM Sans',sans-serif;background:var(--blush);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 10%,rgba(197,149,176,.22) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 90% 90%,rgba(122,45,82,.14) 0%,transparent 55%);pointer-events:none}

/* ── Checking session overlay ── */
.session-check{position:fixed;inset:0;background:var(--blush);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--deep);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-text{font-family:'Syne',sans-serif;font-weight:700;color:var(--deep);font-size:15px}

/* ── Card ── */
.card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(74,26,50,.1);animation:cardIn .45s ease both;display:none}
@keyframes cardIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.brand-icon{width:42px;height:42px;background:var(--rose);border-radius:12px;display:grid;place-items:center;font-size:20px}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:21px}.brand-name span{color:var(--rose)}

/* Tabs */
.tabs{display:flex;background:var(--soft);border-radius:11px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:9px;border-radius:8px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s}
.tab.active{background:#fff;color:var(--deep);box-shadow:0 2px 8px rgba(74,26,50,.1)}

.form-title{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;margin-bottom:4px}
.form-sub{font-size:13px;color:var(--muted);margin-bottom:24px}

.fg{margin-bottom:16px}
.fg label{display:block;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:6px}
.inp-wrap{position:relative}
.inp-wrap input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 42px 11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--soft);outline:none;transition:border-color .2s,background .2s}
.inp-wrap input:focus{border-color:var(--deep);background:#fff}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted)}

.btn{width:100%;background:var(--deep);color:#fff;border:none;padding:13px;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;transition:background .2s,transform .15s}
.btn:hover{background:var(--plum);transform:translateY(-1px)}.btn:disabled{opacity:.6;pointer-events:none}

.forgot{text-align:right;margin-top:8px;font-size:12.5px}
.forgot a{color:var(--deep);cursor:pointer;font-weight:600}.forgot a:hover{text-decoration:underline}

.alt-row{text-align:center;font-size:13px;color:var(--muted);margin-top:20px}
.alt-row a{color:var(--deep);font-weight:700;cursor:pointer}.alt-row a:hover{text-decoration:underline}

.alert{border-radius:9px;padding:11px 14px;font-size:13px;margin-bottom:16px;display:none}
.alert.show{display:block}
.alert.err{background:#fff0f0;border:1px solid #ffc5c5;color:var(--red)}
.alert.ok{background:#f0fff6;border:1px solid #a8e6c0;color:var(--green)}

/* already logged in strip */
.logged-strip{background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:none;font-size:13.5px;align-items:center;justify-content:space-between;gap:10px}
.logged-strip.show{display:flex}
.logged-strip strong{color:var(--deep)}
.strip-btns{display:flex;gap:8px;flex-shrink:0}
.strip-btn{padding:6px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all .2s}
.strip-btn.go{background:var(--deep);color:#fff}.strip-btn.go:hover{background:var(--plum)}
.strip-btn.out{background:var(--soft);color:var(--muted);border:1px solid var(--border)}.strip-btn.out:hover{background:var(--border)}
</style>
</head>
<body>

<!-- Checking existing session spinner -->
<div class="session-check" id="sessionCheck">
  <div class="spinner"></div>
  <div class="spin-text">Checking your session…</div>
</div>

<div class="card" id="card">

  <div class="brand">
    <div class="brand-icon">🛒</div>
    <div class="brand-name">Trend<span>Lilly</span></div>
  </div>

  <!-- Already logged in notice -->
  <div class="logged-strip" id="loggedStrip">
    <span>You're signed in as <strong id="loggedEmail"></strong></span>
    <div class="strip-btns">
      <button class="strip-btn go" onclick="goOrders()">My Orders →</button>
      <button class="strip-btn out" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin"    onclick="switchTab('login')">Sign In</button>
    <button class="tab"        id="tabRegister" onclick="switchTab('register')">Register</button>
  </div>

  <div id="errAlert" class="alert err"></div>
  <div id="okAlert"  class="alert ok"></div>

  <!-- LOGIN -->
  <div id="loginSection">
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Sign in to track your orders &amp; cart</div>
    <div class="fg"><label>Email</label>
      <div class="inp-wrap"><input type="email" id="l_email" placeholder="you@email.com" autocomplete="email"/></div>
    </div>
    <div class="fg"><label>Password</label>
      <div class="inp-wrap">
        <input type="password" id="l_pass" placeholder="••••••••" autocomplete="current-password"/>
        <button class="eye" onclick="togglePwd('l_pass',this)">👁️</button>
      </div>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div class="forgot"><a onclick="forgotPwd()">Forgot password?</a></div>
  </div>

  <!-- REGISTER -->
  <div id="registerSection" style="display:none">
    <div class="form-title">Create account</div>
    <div class="form-sub">Join TrendLilly for a personalised experience</div>
    <div class="fg"><label>Full Name</label>
      <div class="inp-wrap"><input type="text" id="r_name" placeholder="Priya Sharma"/></div>
    </div>
    <div class="fg"><label>Email</label>
      <div class="inp-wrap"><input type="email" id="r_email" placeholder="you@email.com" autocomplete="email"/></div>
    </div>
    <div class="fg"><label>Password</label>
      <div class="inp-wrap">
        <input type="password" id="r_pass" placeholder="Min 6 characters" autocomplete="new-password"/>
        <button class="eye" onclick="togglePwd('r_pass',this)">👁️</button>
      </div>
    </div>
    <div class="fg"><label>Phone (optional)</label>
      <div class="inp-wrap"><input type="tel" id="r_phone" placeholder="+91 98000 00000"/></div>
    </div>
    <button class="btn" id="registerBtn" onclick="doRegister()">Create Account →</button>
  </div>

  <div class="alt-row" id="altRow">
    Don't have an account? <a id="altLink" onclick="switchTab('register')">Register</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  sendPasswordResetEmail, updateProfile, signOut,
  setPersistence, browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyDpnSVwV3QP9MP4tuU5SCtXiwpdAUD0vlc",
  authDomain:"trendlilly-boutique.firebaseapp.com",
  databaseURL:"https://trendlilly-boutique-default-rtdb.firebaseio.com",
  projectId:"trendlilly-boutique",
  storageBucket:"trendlilly-boutique.firebasestorage.app",
  messagingSenderId:"929563690255",
  appId:"1:929563690255:web:b535b31e9cb2f6158b6a7a"
};

const app  = initializeApp(cfg);
const auth = getAuth(app);
const db   = getDatabase(app);

// ✅ KEY: browserLocalPersistence = stays logged in forever until Sign Out
await setPersistence(auth, browserLocalPersistence);

// ── Check if already logged in ──────────────────────
onAuthStateChanged(auth, user => {
  document.getElementById('sessionCheck').style.display = 'none';
  document.getElementById('card').style.display = 'block';
  if (user) {
    // User is already logged in — show the strip
    document.getElementById('loggedStrip').classList.add('show');
    document.getElementById('loggedEmail').textContent = user.email;
  }
});

// ── Helpers ──────────────────────────────────────────
const showErr = m => { clearAlerts(); const e=document.getElementById('errAlert'); e.textContent=m; e.classList.add('show'); };
const showOk  = m => { clearAlerts(); const e=document.getElementById('okAlert');  e.textContent=m; e.classList.add('show'); };
const clearAlerts = () => ['errAlert','okAlert'].forEach(id=>{const e=document.getElementById(id);e.textContent='';e.classList.remove('show');});

const ERRORS = {
  'auth/user-not-found'       : 'No account found with this email.',
  'auth/wrong-password'       : 'Incorrect password.',
  'auth/invalid-credential'   : 'Invalid email or password.',
  'auth/invalid-email'        : 'Please enter a valid email.',
  'auth/email-already-in-use' : 'This email is already registered. Sign in instead.',
  'auth/weak-password'        : 'Password must be at least 6 characters.',
  'auth/too-many-requests'    : 'Too many attempts. Please wait a moment and try again.',
};
const friendly = code => ERRORS[code] || 'Something went wrong. Please try again.';

window.switchTab = tab => {
  const isLogin = tab === 'login';
  document.getElementById('loginSection').style.display    = isLogin ? 'block' : 'none';
  document.getElementById('registerSection').style.display = isLogin ? 'none'  : 'block';
  document.getElementById('tabLogin').classList.toggle('active',  isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('altRow').innerHTML = isLogin
    ? `Don't have an account? <a onclick="switchTab('register')">Register</a>`
    : `Already have an account? <a onclick="switchTab('login')">Sign In</a>`;
  clearAlerts();
};

window.togglePwd = (id, btn) => {
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
};

// ── Login ─────────────────────────────────────────────
window.doLogin = async () => {
  clearAlerts();
  const email = document.getElementById('l_email').value.trim();
  const pass  = document.getElementById('l_pass').value;
  if (!email || !pass) { showErr('Please enter your email and password.'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // ✅ On success: go to orders page
    window.location.href = 'order.html';
  } catch(e) {
    showErr(friendly(e.code));
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
};

// ── Register ──────────────────────────────────────────
window.doRegister = async () => {
  clearAlerts();
  const name  = document.getElementById('r_name').value.trim();
  const email = document.getElementById('r_email').value.trim();
  const pass  = document.getElementById('r_pass').value;
  const phone = document.getElementById('r_phone').value.trim();
  if (!name || !email || !pass) { showErr('Please fill in all required fields.'); return; }
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    // ✅ Save user profile to DB — stored permanently under their UID
    await set(ref(db, `users/${cred.user.uid}`), {
      name, email, phone,
      createdAt: new Date().toISOString(),
      role: 'customer'
    });
    showOk(`Welcome, ${name}! Account created. Redirecting…`);
    setTimeout(() => window.location.href = 'orders.html', 1500);
  } catch(e) {
    showErr(friendly(e.code));
    btn.disabled = false; btn.textContent = 'Create Account →';
  }
};

// ── Forgot password ───────────────────────────────────
window.forgotPwd = async () => {
  clearAlerts();
  const email = document.getElementById('l_email').value.trim();
  if (!email) { showErr('Enter your email above first, then click Forgot password.'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showOk(`Password reset email sent to ${email}. Check your inbox.`);
  } catch(e) { showErr(friendly(e.code)); }
};

// ── Already logged in actions ─────────────────────────
window.goOrders = () => window.location.href = 'order.html';
window.doLogout = async () => {
  await signOut(auth);
  document.getElementById('loggedStrip').classList.remove('show');
  clearAlerts();
};

// Allow Enter to submit
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const registerVisible = document.getElementById('registerSection').style.display !== 'none';
  if (registerVisible) window.doRegister(); else window.doLogin();
});
</script>
</body>
</html>

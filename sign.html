





<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendLilly Boutique - Login</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
}
.container {
background: white;
border-radius: 10px;
box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
width: 100%;
max-width: 400px;
padding: 40px;
}
.logo {
text-align: center;
margin-bottom: 30px;
}
.logo h1 {
color: #333;
font-size: 28px;
margin-bottom: 5px;
}
.logo p {
color: #667eea;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 1px;
}
.tabs {
display: flex;
gap: 10px;
margin-bottom: 30px;
border-bottom: 2px solid #f0f0f0;
}
.tab-btn {
flex: 1;
padding: 12px;
border: none;
background: none;
cursor: pointer;
font-size: 14px;
font-weight: 600;
color: #999;
border-bottom: 3px solid transparent;
transition: all 0.3s ease;
}
.tab-btn.active {
color: #667eea;
border-bottom-color: #667eea;
}
.form-group {
margin-bottom: 20px;
}
.form-group label {
display: block;
margin-bottom: 8px;
color: #333;
font-weight: 500;
font-size: 14px;
}
.form-group input {
width: 100%;
padding: 12px;
border: 1px solid #ddd;
border-radius: 5px;
font-size: 14px;
transition: border-color 0.3s ease;
}
.form-group input:focus {
outline: none;
border-color: #667eea;
box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}
.btn {
width: 100%;
padding: 12px;
border: none;
border-radius: 5px;
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
}
.btn-primary {
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: white;
}
.btn-primary:hover {
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}
.btn-secondary {
background: #f5f5f5;
color: #333;
margin-top: 10px;
}
.btn-secondary:hover {
background: #e0e0e0;
}
.message {
margin-bottom: 20px;
padding: 12px;
border-radius: 5px;
font-size: 14px;
display: none;
}
.message.success {
background: #d4edda;
color: #155724;
border: 1px solid #c3e6cb;
display: block;
}
.message.error {
background: #f8d7da;
color: #721c24;
border: 1px solid #f5c6cb;
display: block;
}
.form-content {
display: none;
}
.form-content.active {
display: block;
}
.link {
text-align: center;
margin-top: 15px;
font-size: 13px;
color: #666;
}
.link a {
color: #667eea;
text-decoration: none;
font-weight: 600;
}
.link a:hover {
text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
<div class="logo">
<h1>TrendLilly</h1>
<p>Boutique</p>
</div>

<div class="tabs">
<button class="tab-btn active" id="login-tab">Sign In</button>
<button class="tab-btn" id="signup-tab">Create Account</button>
<button class="tab-btn" id="guest-tab">Guest Access</button>
</div>

<!-- Login Form -->
<div class="form-content active" id="login-form">
<div class="message" id="login-message"></div>
<div class="form-group">
<label for="login-email">Email Address</label>
<input type="email" id="login-email" placeholder="Enter your email" autocomplete="username">
</div>
<div class="form-group">
<label for="login-password">Password</label>
<input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
</div>
<button class="btn btn-primary" id="login-btn">Sign In</button>
<div class="link">
Don't have an account? <a onclick="switchTab('signup')">Create one</a>
</div>
</div>

<!-- Signup Form -->
<div class="form-content" id="signup-form">
<div class="message" id="signup-message"></div>
<div class="form-group">
<label for="signup-email">Email Address</label>
<input type="email" id="signup-email" placeholder="Enter your email" autocomplete="username">
</div>
<div class="form-group">
<label for="signup-password">Password</label>
<input type="password" id="signup-password" placeholder="Minimum 6 characters" autocomplete="new-password">
</div>
<div class="form-group">
<label for="signup-password-confirm">Confirm Password</label>
<input type="password" id="signup-password-confirm" placeholder="Confirm your password" autocomplete="new-password">
</div>
<button class="btn btn-primary" id="signup-btn">Create Account</button>
<div class="link">
Already have an account? <a onclick="switchTab('login')">Sign in</a>
</div>
</div>

<!-- Guest Form -->
<div class="form-content" id="guest-form">
<div class="message" id="guest-message"></div>
<p style="text-align: center; color: #666; margin-bottom: 20px; font-size: 14px;">
Browse as a guest without creating an account.
</p>
<button class="btn btn-primary" id="guest-btn">Continue as Guest</button>
<div class="link">
Want to save your preferences? <a onclick="switchTab('login')">Sign in</a>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

// Firebase Configuration
const firebaseConfig = {
apiKey: "AIzaSyDpnSVwV3QP9MP4tuU5SCtXiwpdAUD0vlc",
authDomain: "trendlilly-boutique.firebaseapp.com",
databaseURL: "https://trendlilly-boutique-default-rtdb.firebaseio.com",
projectId: "trendlilly-boutique",
storageBucket: "trendlilly-boutique.firebasestorage.app",
messagingSenderId: "929563690255",
appId: "1:929563690255:web:b535b31e9cb2f6158b6a7a",
measurementId: "G-E20KHHLX35"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ===== HELPER FUNCTIONS =====
function showMessage(elementId, message, type) {
const msgEl = document.getElementById(elementId);
msgEl.textContent = message;
msgEl.className = `message ${type}`;
}

function clearMessages() {
document.getElementById('login-message').className = 'message';
document.getElementById('signup-message').className = 'message';
document.getElementById('guest-message').className = 'message';
}

function switchTab(tabName) {
clearMessages();

const tabs = document.querySelectorAll('.tab-btn');
const forms = document.querySelectorAll('.form-content');

tabs.forEach(tab => tab.classList.remove('active'));
forms.forEach(form => form.classList.remove('active'));

if (tabName === 'login') {
document.getElementById('login-tab').classList.add('active');
document.getElementById('login-form').classList.add('active');
} else if (tabName === 'signup') {
document.getElementById('signup-tab').classList.add('active');
document.getElementById('signup-form').classList.add('active');
} else if (tabName === 'guest') {
document.getElementById('guest-tab').classList.add('active');
document.getElementById('guest-form').classList.add('active');
}
}

// ===== LOGIN FUNCTION =====
window.doLogin = function() {
clearMessages();

const email = document.getElementById('login-email').value.trim();
const password = document.getElementById('login-password').value;

if (!email || !password) {
showMessage('login-message', 'Please enter both email and password', 'error');
return;
}

if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
showMessage('login-message', 'Please enter a valid email address', 'error');
return;
}

signInWithEmailAndPassword(auth, email, password)
.then((userCredential) => {
showMessage('login-message', 'Welcome back! Redirecting...', 'success');
console.log('Logged in:', userCredential.user.email);

// Redirect after 1.5 seconds
setTimeout(() => {
window.location.href = 'dashboard.html';
}, 1500);
})
.catch((error) => {
let errorMsg = 'Login failed';

if (error.code === 'auth/user-not-found') {
errorMsg = 'Email not found. Create an account first.';
} else if (error.code === 'auth/wrong-password') {
errorMsg = 'Incorrect password. Try again.';
} else if (error.code === 'auth/invalid-email') {
errorMsg = 'Invalid email format.';
} else if (error.code === 'auth/user-disabled') {
errorMsg = 'This account has been disabled.';
} else {
errorMsg = error.message || 'Login failed. Try again.';
}

showMessage('login-message', errorMsg, 'error');
console.error('Login error:', error);
});
};

// ===== SIGNUP FUNCTION =====
window.doSignup = function() {
clearMessages();

const email = document.getElementById('signup-email').value.trim();
const password = document.getElementById('signup-password').value;
const confirmPassword = document.getElementById('signup-password-confirm').value;

if (!email || !password || !confirmPassword) {
showMessage('signup-message', 'Please fill in all fields', 'error');
return;
}

if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
showMessage('signup-message', 'Please enter a valid email address', 'error');
return;
}

if (password.length < 6) {
showMessage('signup-message', 'Password must be at least 6 characters', 'error');
return;
}

if (password !== confirmPassword) {
showMessage('signup-message', 'Passwords do not match', 'error');
return;
}

createUserWithEmailAndPassword(auth, email, password)
.then((userCredential) => {
showMessage('signup-message', 'Account created successfully! Logging you in...', 'success');
console.log('Account created:', userCredential.user.email);

setTimeout(() => {
window.location.href = 'order.html';
}, 1500);
})
.catch((error) => {
let errorMsg = 'Signup failed';

if (error.code === 'auth/email-already-in-use') {
errorMsg = 'This email is already registered. Sign in instead.';
} else if (error.code === 'auth/invalid-email') {
errorMsg = 'Invalid email format.';
} else if (error.code === 'auth/weak-password') {
errorMsg = 'Password is too weak. Use a stronger password.';
} else {
errorMsg = error.message || 'Signup failed. Try again.';
}

showMessage('signup-message', errorMsg, 'error');
console.error('Signup error:', error);
});
};

// ===== GUEST FUNCTION =====
window.doGuest = function() {
clearMessages();
showMessage('guest-message', 'Loading guest mode...', 'success');

setTimeout(() => {
// Store guest status in localStorage
localStorage.setItem('guestMode', 'true');
window.location.href = 'order.html';
}, 500);
};

// ===== EVENT LISTENERS =====
document.getElementById('login-tab').addEventListener('click', () => switchTab('login'));
document.getElementById('signup-tab').addEventListener('click', () => switchTab('signup'));
document.getElementById('guest-tab').addEventListener('click', () => switchTab('guest'));

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('signup-btn').addEventListener('click', doSignup);
document.getElementById('guest-btn').addEventListener('click', doGuest);

// Allow Enter key to submit
document.getElementById('login-email').
// Allow Enter key to submit
        document.getElementById('login-email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('login-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });

        document.getElementById('signup-email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSignup();
        });
        document.getElementById('signup-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSignup();
        });
        document.getElementById('signup-password-confirm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSignup();
        });

        // Make switchTab globally accessible (used in onclick attributes in HTML)
        window.switchTab = switchTab;

    </script>
</body>
</html>
